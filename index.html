<!doctype html>
<html lang="de">
	<head>
		<script>
			// GitHub Pages project sites live at github.io/REPO_NAME/, not at domain root.
			(function () {
				if (!location.hostname.endsWith('github.io')) return;
				var segment = location.pathname.split('/').filter(Boolean)[0];
				if (!segment) return;
				var base = document.createElement('base');
				base.href = '/' + segment + '/';
				document.head.prepend(base);
			})();
		</script>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>Internationale Wirtschaftsbeziehungen</title>

		<link rel="stylesheet" href="assets/reveal/dist/reset.css">
		<link rel="stylesheet" href="assets/reveal/dist/reveal.css">
		<link rel="stylesheet" href="assets/reveal/dist/theme/night.css">
		<link rel="stylesheet" href="assets/css/custom.css">

		<link rel="stylesheet" href="assets/reveal/plugin/highlight/monokai.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section data-markdown="slides.md" data-separator="^---$" data-separator-vertical="^--$"
					data-separator-notes="^Notes:$" data-charset="utf-8">
				</section>
			</div>
		</div>

		<script src="assets/reveal/dist/reveal.js"></script>
		<script src="assets/reveal/plugin/notes/notes.js"></script>
		<script src="assets/reveal/plugin/markdown/markdown.js"></script>
		<script src="assets/reveal/plugin/highlight/highlight.js"></script>
		<script src="assets/reveal/plugin/math/math.js"></script>
		<script src="assets/plugins/external-html.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/reveal.js-plugins@4.2.5/chart/plugin.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.2.0/chart.min.js"></script>
		<script>
			Reveal.initialize({
				hash: true,
				plugins: [
					RevealMarkdown,
					RevealHighlight,
					RevealNotes,
					RevealMath.KaTeX,
					RevealChart,
					ExternalHtmlPlugin
				]
			});
		</script>
	</body>
</html>
