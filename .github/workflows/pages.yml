name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/prepare-pages.mjs

      - name: Verify site artifact
        run: |
          test -f site/.nojekyll
          test -f site/assets/reveal/dist/reveal.js
          test -f site/assets/reveal/dist/reveal.css
          test -f site/assets/css/custom.css
          echo "Site files:" && find site -type f | wc -l

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
